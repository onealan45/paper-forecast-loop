name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    name: pytest and compile
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Check CLI help
        run: python .\run_forecast_loop.py --help

      - name: Run tests
        run: python -m pytest -q

      - name: Compile Python files
        run: python -m compileall -q src tests run_forecast_loop.py sitecustomize.py
